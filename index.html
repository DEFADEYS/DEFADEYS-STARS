<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFADEYS STARS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* чтобы видео не прокручивалось */
        }

        .background {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        /* Видео вместо картинки */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(5px); /* размытость видео */
        }

        /* Полупрозрачное затемнение */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        /* Тёмная панель за кнопками */
        .button-bar {
            position: relative;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 1;
        }

        .btn {
            padding: 12px 30px;
           background: #8000ff; /* фиолетовый */
color: #fff; /* белый текст, чтобы было читаемо */
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Текст уведомления "В разработке" */
        .alert {
            position: absolute;
            top: 10px;
            background: rgba(255, 215, 0, 0.9);
            color: #000;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .title {
            margin-top: 40px; /* отступ после кнопок */
            color: white;
            font-size: 4rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 10px 30px rgba(0,0,0,0.7);
            animation: slideDown 1.5s ease-out forwards;
        }

        /* Текст внизу справа */
        .footer-text {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #000; /* черный цвет */
            font-size: 0.75rem;
            font-weight: 500;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.2rem;
                letter-spacing: 0.25rem;
                margin-top: 35px;
            }
            .btn {
                font-size: 1rem;
                padding: 10px 25px;
            }
            .alert {
                font-size: 1rem;
                padding: 8px 20px;
            }
            .footer-text {
                font-size: 0.65rem;
                bottom: 8px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- Видео вместо картинки -->
        <video autoplay muted loop class="bg-video">
            <source src="background.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>

        <div class="overlay"></div>

        <!-- Текст уведомления -->
        <div id="alert" class="alert">В разработке...</div>

        <!-- Тёмная панель с кнопками -->
        <div class="button-bar">
            <a href="https://t.me/b1tccoin" class="btn" target="_blank">Получить звёзды</a>
            <button class="btn" id="supportBtn">Поддержать владельца</button>
            <a href="https://t.me/ootzziv" class="btn" target="_blank">Отзывы</a>
        </div>

        <h1 class="title">DEFADEYS STARS</h1>

        <!-- Текст внизу справа -->
        <div class="footer-text">Created by @qexeerty</div>
    </div>

    <script>
        const supportBtn = document.getElementById('supportBtn');
        const alertBox = document.getElementById('alert');

        supportBtn.addEventListener('click', () => {
            // Показываем уведомление
            alertBox.style.opacity = '1';

            // Через 4 секунды скрываем
            setTimeout(() => {
                alertBox.style.opacity = '0';
            }, 4000);
        });
    </script>
</body>
</html>
